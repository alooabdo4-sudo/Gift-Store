<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الهدايا</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }
        
        header {
            background-color: #e74c3c;
            color: white;
            padding: 20px;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-icon {
            cursor: pointer;
            font-size: 24px;
            position: relative;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            left: -10px;
            background-color: #fff;
            color: #e74c3c;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
        }
        
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }
        
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        
        .product-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
        }
        
        .product-image {
            width: 100%;
            height: 200px;
            background-color: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        
        .product-info {
            padding: 15px;
        }
        
        .product-name {
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .product-price {
            color: #e74c3c;
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .buy-btn {
            width: 100%;
            padding: 10px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        
        .buy-btn:hover {
            background-color: #c0392b;
        }

        /* نمط السلة */
        .cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .cart-modal.active {
            display: flex;
        }

        .cart-content {
            background: white;
            width: 90%;
            max-width: 500px;
            border-radius: 8px;
            padding: 20px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .cart-header {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #e74c3c;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .item-details {
            flex: 1;
        }

        .item-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .item-price {
            color: #e74c3c;
        }

        .item-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .quantity-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            width: 25px;
            height: 25px;
            border-radius: 4px;
            cursor: pointer;
        }

        .quantity {
            width: 30px;
            text-align: center;
        }

        .remove-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .cart-empty {
            text-align: center;
            padding: 20px;
            color: #999;
        }

        .cart-total {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e74c3c;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .checkout-btn {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        .checkout-btn:hover {
            background-color: #229954;
        }

        .success-message {
            background-color: #27ae60;
            color: white;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <header>
        <h1>🎁 متجر الهدايا</h1>
        <div class="cart-icon" onclick="openCart()">
            🛒
            <span class="cart-count" id="cart-count">0</span>
        </div>
    </header>
    
    <div class="container">
        <div class="success-message" id="success-message">✓ تم إضافة المنتج إلى السلة!</div>
        <div class="products" id="products-container"></div>
    </div>

    <!-- السلة -->
    <div class="cart-modal" id="cart-modal">
        <div class="cart-content">
            <div class="cart-header">
                🛒 السلة
                <button class="close-btn" onclick="closeCart()">✕</button>
            </div>
            <div id="cart-items"></div>
            <div id="cart-total-section"></div>
        </div>
    </div>

    <script>
        // البيانات الأساسية للمنتجات
        const products = [
            { id: 1, name: 'هدية فاخرة', price: 150, emoji: '🎀' },
            { id: 2, name: 'صندوق هدايا', price: 200, emoji: '💝' },
            { id: 3, name: 'باقة ورود', price: 120, emoji: '🌹' },
            { id: 4, name: 'هدية فخمة', price: 300, emoji: '💎' },
            { id: 5, name: 'ساعة ذهبية', price: 450, emoji: '⌚' },
            { id: 6, name: 'عطر فاخر', price: 200, emoji: '🌸' }
        ];

        // تحميل البيانات من localStorage
        function loadCart() {
            const savedCart = localStorage.getItem('giftCart');
            return savedCart ? JSON.parse(savedCart) : [];
        }

        // حفظ السلة في localStorage
        function saveCart(cart) {
            localStorage.setItem('giftCart', JSON.stringify(cart));
            updateCartCount();
        }

        // عرض المنتجات
        function displayProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-image">${product.emoji}</div>
                    <div class="product-info">
                        <div class="product-name">${product.name}</div>
                        <div class="product-price">${product.price} ريال</div>
                        <button class="buy-btn" onclick="addToCart(${product.id})">أضف إلى السلة</button>
                    </div>
                </div>
            `).join('');
        }

        // إضافة منتج إلى السلة
        function addToCart(productId) {
            const cart = loadCart();
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            saveCart(cart);
            showSuccessMessage();
        }

        // إزالة منتج من السلة
        function removeFromCart(productId) {
            let cart = loadCart();
            cart = cart.filter(item => item.id !== productId);
            saveCart(cart);
            displayCart();
        }

        // تحديث الكمية
        function updateQuantity(productId, quantity) {
            if (quantity < 1) return;
            const cart = loadCart();
            const item = cart.find(item => item.id === productId);
            if (item) {
                item.quantity = quantity;
                saveCart(cart);
                displayCart();
            }
        }

        // عرض السلة
        function displayCart() {
            const cart = loadCart();
            const cartItemsDiv = document.getElementById('cart-items');
            const cartTotalDiv = document.getElementById('cart-total-section');

            if (cart.length === 0) {
                cartItemsDiv.innerHTML = '<div class="cart-empty">السلة فارغة 😔</div>';
                cartTotalDiv.innerHTML = '';
                return;
            }

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            cartItemsDiv.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="item-details">
                        <div class="item-name">${item.emoji} ${item.name}</div>
                        <div class="item-price">${item.price} ريال</div>
                    </div>
                    <div class="item-controls">
                        <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity - 1})">−</button>
                        <span class="quantity">${item.quantity}</span>
                        <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
                        <button class="remove-btn" onclick="removeFromCart(${item.id})">حذف</button>
                    </div>
                </div>
            `).join('');

            cartTotalDiv.innerHTML = `
                <div class="cart-total">
                    <span>الإجمالي:</span>
                    <span>${total} ريال</span>
                </div>
                <button class="checkout-btn" onclick="checkout()">إتمام الشراء</button>
            `;
        }

        // فتح السلة
        function openCart() {
            displayCart();
            document.getElementById('cart-modal').classList.add('active');
        }

        // إغلاق السلة
        function closeCart() {
            document.getElementById('cart-modal').classList.remove('active');
        }

        // عرض رسالة النجاح
        function showSuccessMessage() {
            const msg = document.getElementById('success-message');
            msg.classList.add('show');
            setTimeout(() => msg.classList.remove('show'), 2000);
        }

        // إتمام الشراء
        function checkout() {
            const cart = loadCart();
            if (cart.length === 0) return;
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            alert(`شكراً لك! 🎉\nإجمالي المشتريات: ${total} ريال\nتم حفظ طلبك بنجاح!`);
            
            // حفظ الطلب
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            orders.push({
                date: new Date().toLocaleString('ar-SA'),
                items: cart,
                total: total
            });
            localStorage.setItem('orders', JSON.stringify(orders));
            
            // تفريغ السلة
            localStorage.setItem('giftCart', JSON.stringify([]));
            closeCart();
            updateCartCount();
        }

        // تحديث عدد المنتجات في السلة
        function updateCartCount() {
            const cart = loadCart();
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').textContent = count;
        }

        // تشغيل عند تحميل الصفحة
        window.addEventListener('load', () => {
            displayProducts();
            updateCartCount();
        });

        // إغلاق السلة عند الضغط خارجها
        document.getElementById('cart-modal').addEventListener('click', (e) => {
            if (e.target.id === 'cart-modal') {
                closeCart();
            }
        });
    </script>
</body>
</html>
