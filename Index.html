<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الهدايا</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }
        
        header {
            background-color: #e74c3c;
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }
        
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        
        .product-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
        }
        
        .product-image {
            width: 100%;
            height: 200px;
            background-color: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        
        .product-info {
            padding: 15px;
        }
        
        .product-name {
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .product-price {
            color: #e74c3c;
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .buy-btn {
            width: 100%;
            padding: 10px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .buy-btn:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>
    <header>
        <h1>🎁 متجر الهدايا</h1>
    </header>
    
    <div class="container">
        <div class="products">
            <div class="product-card">
                <div class="product-image">🎀</div>
                <div class="product-info">
                    <div class="product-name">هدية فاخرة</div>
                    <div class="product-price">150 ريال</div>
                    <button class="buy-btn">أضف إلى السلة</button>
                </div>
            </div>
            
            <div class="product-card">
                <div class="product-image">💝</div>
                <div class="product-info">
                    <div class="product-name">صندوق هدايا</div>
                    <div class="product-price">200 ريال</div>
                    <button class="buy-btn">أضف إلى السلة</button>
                </div>
            </div>
            
            <div class="product-card">
                <div class="product-image">🌹</div>
                <div class="product-info">
                    <div class="product-name">باقة ورود</div>
                    <div class="product-price">120 ريال</div>
                    <button class="buy-btn">أضف إلى السلة</button>
                </div>
            </div>
        </div>
    </div>
</body>
  </html>
